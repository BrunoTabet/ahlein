<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ahlein Admin</title>
  <style>
    :root { --bg:#f4f1ea; --ink:#2b2a26; --accent:#b5623a; --line:#ddd6c8; --card:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, system-ui, sans-serif; background:var(--bg);
           color:var(--ink); line-height:1.5; }
    header { background:var(--card); border-bottom:1px solid var(--line);
             padding:14px 24px; display:flex; align-items:center; gap:16px; }
    header h1 { font-size:18px; margin:0; }
    header .sp { flex:1; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    main { max-width:880px; margin:28px auto; padding:0 20px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
            padding:20px; margin-bottom:22px; }
    h2 { margin-top:0; font-size:16px; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); font-size:14px; }
    th { color:#7a7568; font-weight:600; }
    label { display:block; font-size:13px; color:#6b665a; margin:10px 0 3px; }
    input, select, textarea { width:100%; padding:8px 10px; border:1px solid var(--line);
            border-radius:7px; font-size:14px; font-family:inherit; background:#fff; }
    textarea { min-height:90px; font-family:ui-monospace, monospace; }
    .row { display:flex; gap:14px; }
    .row > div { flex:1; }
    button { background:var(--accent); color:#fff; border:0; border-radius:7px;
             padding:9px 16px; font-size:14px; cursor:pointer; margin-top:14px; }
    button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent);
                   padding:4px 10px; margin:0; }
    .muted { color:#8a8576; font-size:13px; }
    .pill { font-size:12px; padding:2px 8px; border-radius:20px; background:#eee7d8; }
    .pill.off { background:#f0d9d2; color:#9c4a2c; }
  </style>
</head>
<body>
  <header>
    <h1>Ahlein <span class="muted">· admin</span></h1>
    <span class="sp"></span>
    {% block nav %}<a href="/admin">Clinics</a> &nbsp; <a href="/admin/logout">Log out</a>{% endblock %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
